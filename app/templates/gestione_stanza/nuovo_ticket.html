{% extends "base.html" %}
{% block content %}

<div class="container mt-4" style="max-width: 600px;">
  <h2 class="mb-4">Apri un nuovo Ticket</h2>

  <form method="POST" enctype="multipart/form-data">
    <div class="mb-3">
      <label for="titolo" class="form-label">Titolo</label>
      <input type="text" class="form-control" id="titolo" name="titolo"
             placeholder="Es. Perdita d'acqua in bagno" required>
    </div>
    <div class="mb-3">
      <label for="descrizione" class="form-label">Descrizione</label>
      <textarea class="form-control" id="descrizione" name="descrizione"
                rows="4" placeholder="Descrivi il problema nel dettaglio..." required></textarea>
    </div>
     <div class="mb-3">
      <label for="foto" class="form-label">Foto (opzionale)</label>
      <input type="file" class="form-control" id="foto" name="foto"
             multiple accept="image/*">
      <div class="form-text">Puoi allegare più foto (jpg, png, webp).</div>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Invia ticket</button>
      <a href="{{ url_for('gestione_stanza.visualizza_ticket') }}" class="btn btn-outline-secondary">Annulla</a>
    </div>
       
  </form>
</div>

{% endblock %}
