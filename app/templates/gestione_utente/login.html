{% extends 'base.html' %}

{# Nasconde la navbar #}
{% block navbar %}{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-md-5">
        <div class="card bg-white p-5 rounded-4 shadow-sm border-0">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Log in your home page!</h2>
                <p class="text-muted">Bentornato su UniAlloggi</p>
            </div>
            
            <form method="POST" action="{{ url_for('gestione_utente.login') }}">
                <div class="mb-3">
                    <input type="email" name="email" class="form-control form-control-lg bg-light border-0" placeholder="Email" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="form-control form-control-lg bg-light border-0" placeholder="Password" required>
                </div>
                <div class="d-flex justify-content-between mb-4 px-1">
                    <a href="{{url_for('gestione_utente.forgot_password')}}" class="text-decoration-none text-muted small">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-dark btn-lg w-100 mb-3 rounded-3">Sign in</button>
                
                <div class="text-center mt-3">
                    <span class="text-muted small">Non hai un account? </span>
                    <a href="{{ url_for('gestione_utente.register') }}" class="text-dark fw-bold text-decoration-none">Register</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
