{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 bg-white p-5 rounded shadow">
        <h2 class="mb-4">Log in your home page!</h2>
        <form method="POST" action="{{ url_for('gestione_utente.login') }}">
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <div class="d-flex justify-content-between mb-3">
                <a href="{{url_for('gestione_utente.forgot_password')}}" class="text-decoration-none">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-dark w-100">Sign in</button>
            <div class="text-center mt-3">
                <a href="{{ url_for('gestione_utente.register') }}" class="text-decoration-none">Non hai un account? Register</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
