{% extends 'base.html' %}

{# Nasconde la navbar standard #}
{% block navbar %}{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center min-vh-100 py-5">
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden" style="max-width: 800px; width: 100%;">
        <div class="row g-0">
            
          <div class="col-md-5 bg-primary d-flex align-items-center justify-content-center text-white">
            <div class="text-center">
                <i class="bi bi-house-fill" style="font-size: 5rem;"></i>
                <h2 class="fw-bold mt-2">UniAlloggi</h2>
            </div>
        </div>
            <div class="col-md-7 p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Register your account</h2>
                    <p class="text-muted">Crea il tuo profilo su UniAlloggi</p>
                </div>
                
                <form method="POST" action="{{ url_for('gestione_utente.register') }}">
                    <div class="row mb-3 g-2">
                        <div class="col"><input type="text" name="nome" class="form-control bg-light border-0" placeholder="Nome" required></div>
                        <div class="col"><input type="text" name="cognome" class="form-control bg-light border-0" placeholder="Cognome" required></div>
                    </div>
                    <div class="mb-3"><input type="email" name="email" class="form-control bg-light border-0" placeholder="Email" required></div>
                    <div class="mb-3"><input type="text" name="numTelefono" class="form-control bg-light border-0" placeholder="Numero di telefono(Opzionale)"></div>
                    <div class="mb-3"><input type="password" name="password" class="form-control bg-light border-0" placeholder="Password" required></div>
                    
                    <div class="mb-4">
                        <select name="ruolo" id="ruoloSelect" class="form-select bg-light border-0" onchange="toggleStudentFields()" required>
                            <option value="" disabled selected>Seleziona Ruolo</option>
                            <option value="studente">Studente</option>
                            <option value="locatore">Locatore</option>
                        </select>
                    </div>
                    
                    <div id="studentFields" style="display: none;" class="p-3 bg-light rounded-3 mb-4">
                        <input type="text" name="universita" class="form-control border-0 mb-2" placeholder="Università">
                        <input type="text" name="facolta" class="form-control border-0 mb-2" placeholder="Facoltà">
                        <input type="text" name="corso" class="form-control border-0 mb-2" placeholder="Corso">

                    </div>

                    <button type="submit" class="btn btn-dark w-100 mb-3">Sign up</button>
                    <div class="text-center small">
                        <span class="text-muted">Hai già un account? </span>
                        <a href="{{ url_for('gestione_utente.login') }}" class="text-dark fw-bold text-decoration-none">Log In</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleStudentFields() {
        const ruolo = document.getElementById('ruoloSelect').value;
        document.getElementById('studentFields').style.display = (ruolo === 'studente') ? 'block' : 'none';
    }
</script>
{% endblock %}
