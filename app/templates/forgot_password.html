{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 bg-white p-5 rounded shadow">
        <h2 class="mb-3">Recupero Password</h2>
        <p class="text-muted small mb-4">Inserisci il tuo indirizzo email. Ti invieremo un link protetto per reimpostare la tua password.</p>
        <form method="POST">
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Inserisci la tua Email" required>
            </div>
            <button type="submit" class="btn btn-dark w-100 mb-3">Invia Link di Ripristino</button>
            <div class="text-center">
                <a href="{{ url_for('gestione_utente.login') }}" class="text-decoration-none small">Torna al Login</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
